name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node 24 for the Action runtime itself (the JS engine that
# executes actions/checkout@v4 and actions/setup-node@v4 internally).
# Default is still Node 20 today, but GitHub flips the default on
# 2026-06-02 and removes Node 20 entirely on 2026-09-16. Setting this
# now silences the deprecation warning and front-loads any breakage
# while we still have time to fix it. Has no effect on the Node
# version OUR code runs under — that's controlled by setup-node's
# `node-version: '22'` further down.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    name: Build + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Using `npm install` instead of `npm ci`: vitest 4's transitive
        # @rolldown/binding-wasm32-wasi declares optional wasm32 deps
        # (@emnapi/runtime, @emnapi/core) that don't survive a Windows-
        # generated lock. `npm ci` is strict and rejects; `npm install`
        # resolves them on the runner.
        # Trade-off: lose strict lock-file reproducibility. Acceptable
        # for a hackathon-tier project where the dep graph is stable
        # and re-resolution at install time is fine.
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Lint
        run: npm run lint
        continue-on-error: true # ESLint warnings shouldn't fail the build during dev

      - name: Run tests
        run: npm test

      - name: Build (Turbopack)
        run: npm run build
        env:
          # Dummy values so any module-load-time env checks pass.
          # All real env reads are lazy and don't actually fire during build.
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_anon_key
